<!DOCTYPE html>
<html>
<head>
<title>MyMusic</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  padding: 15px;
  background: #181818;
  display: flex;
  justify-content: space-between;
}

.container {
  display: flex;
}

/* sidebar */
.sidebar {
  width: 200px;
  background: #111;
  height: 100vh;
  padding: 10px;
}

.sidebar div {
  padding: 10px;
  cursor: pointer;
}

.sidebar div:hover {
  background: #222;
}

/* main */
.main {
  flex: 1;
  padding: 20px;
}

/* song card */
.card {
  background: #181818;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.card:hover {
  background: #222;
}

/* player */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #181818;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
iframe {
  width: 300px;
  height: 80px;
  border: none;
}

button {
  padding: 8px;
}
</style>
</head>

<body>

<div class="header">
  <div>🎵 MyMusic</div>
  <input id="search" placeholder="Search..." onkeyup="filterSongs()">
</div>

<div class="container">

  <div class="sidebar">
    <div onclick="loadFav()">❤️ Favorites</div>
    <div onclick="loadAll()">🎶 All Songs</div>
  </div>

  <div class="main" id="songList"></div>

</div>

<div class="player">
  <div id="nowPlaying">Now Playing: None</div>
  <div>
    <button onclick="toggleFav()">❤️</button>
    <button onclick="nextSong()">⏭</button>
  </div>

  <iframe id="player"
  src=""
  allow="autoplay"></iframe>
</div>

<script>

];

function render(list){
  let html = "";
  list.forEach((s,i)=>{
    html += `
      <div class="card" onclick="play(${i})">
        🎵 ${s.title}
      </div>
    `;
  });
  document.getElementById("songList").innerHTML = html;
}

function play(index){
  currentIndex = index;
  let song = songs[index];

  "https://www.youtube.com/embed/" + song.id + "?autoplay=1";

  document.getElementById("nowPlaying").innerText =
  "Now Playing: " + song.title;
}
